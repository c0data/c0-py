name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # c0-c (the header) + c0-spec (vectors) submodules
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build the extension
        run: pip install .
      - name: Test
        run: python -m unittest discover -s tests
