name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # c0-c (the header) + c0-spec (vectors) submodules
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build the extension
        run: pip install .
      - name: Test
        run: python -m unittest discover -s tests

  docs:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # the C extension build needs the c0-c header
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build and install pdoc
        run: pip install . pdoc
      - name: Generate API docs (pdoc)
        run: pdoc -o docs c0
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
